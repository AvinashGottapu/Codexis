version: '3.8'

services:
  postgres_static:
    image: postgres:15-alpine
    container_name: codexis-postgres
    environment:
      POSTGRES_USER: username
      POSTGRES_PASSWORD: password
      POSTGRES_DB: codexis_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_static_data:/var/lib/postgresql/data
    restart: always

  postgres_user:
    image: postgres:15-alpine
    container_name: codexis-user-postgres
    environment:
      POSTGRES_USER: username
      POSTGRES_PASSWORD: password
      POSTGRES_DB: codexis_user_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_user_data:/var/lib/postgresql/data
    restart: always

  redis: 
    image: redis:7-alpine
    container_name: codexis-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

volumes:
  postgres_static_data:
  postgres_user_data:
  redis_data:
